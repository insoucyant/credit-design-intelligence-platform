project:
  name: credit-decision-intelligence-platform
  version: 0.1.0
  environment: development 

paths:
  data: data
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  models: models
  reports: reports
  logs: logs 

logging:
  level: INFO
  format: json

mode:
  random_seed: 42

api: 
  host: 0.0.0.0
  port: 8000

mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: credit-decision-intelligence-platform 

monitoring:
  enabled: true
  frequency: daily
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score